<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<!--
  Render-Vorlage für das Social-Sharing-Bild (Open Graph / Twitter Card).
  Ausgabe: public/images/og-default.jpg  (1200 × 630)

  Neu rendern: scripts/og-image/og-default.html bei Viewport 1200×630 öffnen
  und .og-card als Bild exportieren (oder via Playwright-Screenshot des Viewports),
  danach mit sips auf JPG bringen. Siehe scripts/og-image/README.md.

  Aktuelles Motiv: Logo (dunkle Kuh + heller Schriftzug, enthält bereits
  «Tierrechtskongress 2026 / Tier im Fokus») gross und zentriert auf dem
  Beton-Hintergrund — gleicher Look wie der Hero der Startseite.

  Wichtig: Verwendet wird trk-logo-trim.png (zugeschnittenes Logo). Das Original
  public/images/trk-logo.png hat ungleiche transparente Ränder (oben 271px, unten 19px),
  wodurch das Motiv nicht echt mittig sässe. Das Trim entsteht aus dem Original via
  Pillow im.crop(im.getbbox()) — siehe README. Original NICHT ersetzen (Hero nutzt es).
-->
<style>
  :root {
    --brand-black: #26282a;
    --brand-gold:  #e5b969;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { background: #cfcfca; }

  .og-card {
    width: 1200px;
    height: 630px;
    position: relative;
    overflow: hidden;
    background-image: url('../../public/images/trk-header-bg.png');
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Getrimmtes Logo gross & echt zentriert (Motiv = Bounding-Box).
     Höhe limitiert das 1200×630-Format; 600px lässt ~15px Safe-Margin oben/unten. */
  .og-card__logo {
    height: 600px;
    width: auto;
    display: block;
  }
</style>
</head>
<body>
  <div class="og-card">
    <img class="og-card__logo"
         src="trk-logo-trim.png"
         alt="Tierrechtskongress 2026 — Tier im Fokus" />
  </div>
</body>
</html>
